name: Build and Deploy Screeps

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    env:
      SCREEPS_HOST: screeps.com
      SCREEPS_BRANCH: main
      SCREEPS_TOKEN: ${{ secrets.SCREEPS_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Build single main.js bundle
        run: npm run build

      - name: Upload bundle to Screeps
        run: npm run upload
